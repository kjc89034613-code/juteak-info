<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>주택전시관 현황 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root {
    /* Neutrals */
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-muted: #f7f7f8;
    --border: #ececef;
    --border-strong: #d8d8dd;
    --divider: #f2f2f4;

    /* Text */
    --text: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --text-disabled: #d4d4d8;

    /* Accent (indigo - 한 가지만 사용) */
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-soft: #eef2ff;
    --accent-border: #e0e7ff;

    /* States */
    --success: #16a34a;
    --success-soft: #f0fdf4;
    --success-border: #dcfce7;
    --danger: #dc2626;
    --danger-hover: #b91c1c;

    /* Shadows - very subtle */
    --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);
    --shadow-lg: 0 8px 24px rgba(16, 24, 40, 0.10);

    /* Radius */
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 10px;
    --radius-xl: 12px;

    /* Type */
    --font-sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-sans);
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: -0.01em;
  }

  /* 페이지 헤더 */
  .page-header {
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .page-header::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -1px;
    height: 3px;
    background: linear-gradient(90deg, #4f46e5 0%, #c2410c 50%, #18181b 100%);
    border-radius: 2px;
  }
  .header-badge {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    background: linear-gradient(135deg, #18181b 0%, #3f3f46 100%);
    color: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(24, 24, 27, 0.20), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .page-header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.025em;
    line-height: 1.2;
  }

  /* 메인 탭 (컬러 세그먼트) */
  .main-tabs {
    display: inline-flex;
    gap: 4px;
    margin-bottom: 22px;
    background: var(--surface);
    padding: 5px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
  }
  .main-tabs button {
    padding: 12px 26px;
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-weight: 700;
    font-size: 16px;
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: -0.01em;
    position: relative;
  }
  .main-tabs button:hover {
    color: var(--text);
    background: var(--surface-muted);
  }
  .main-tabs button#mainTabInfo.active {
    background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    color: var(--surface);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
  }
  .main-tabs button#mainTabDevice.active {
    background: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
    color: var(--surface);
    box-shadow: 0 2px 8px rgba(194, 65, 12, 0.30);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 상단 셀렉터 영역 */
  .top-bar {
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .top-bar .label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  /* 커스텀 드롭다운 (주택전시관 선택) */
  .custom-select {
    position: relative;
    display: inline-block;
    flex: 1;
    min-width: 240px;
    max-width: 480px;
  }
  .custom-select-btn {
    width: 100%;
    min-width: 240px;
    padding: 11px 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    font-size: 15px;
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: inherit;
    color: var(--text);
    gap: 8px;
    transition: all 0.15s ease;
    font-weight: 600;
  }
  .custom-select-btn:hover {
    border-color: var(--text-muted);
    background: var(--surface-muted);
  }
  .custom-select.open .custom-select-btn {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .custom-select-btn .arrow {
    color: var(--text-muted);
    font-size: 10px;
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .custom-select.open .custom-select-btn .arrow {
    transform: rotate(180deg);
  }
  .custom-select-list {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 100%;
    width: max-content;
    max-width: 90vw;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    max-height: 60vh;
    overflow-y: auto;
    z-index: 50;
    padding: 4px;
  }
  .custom-select.open .custom-select-list { display: block; }
  .custom-select-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: 5px;
    transition: background 0.1s ease;
    font-weight: 500;
  }
  .custom-select-item:hover { background: var(--surface-muted); }
  .custom-select-item.selected {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  /* 서브 탭 (모바일에서만 표시) */
  .sub-tabs {
    display: none;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--surface);
    padding: 4px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
  }
  .sub-tabs button {
    flex: 1;
    padding: 11px 8px;
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    transition: all 0.2s ease;
  }
  .sub-tabs button#subTabInfo.active {
    background: linear-gradient(135deg, #18181b 0%, #3f3f46 100%);
    color: var(--surface);
    box-shadow: 0 2px 6px rgba(24, 24, 27, 0.18);
  }
  .sub-tabs button#subTabExt.active {
    background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    color: var(--surface);
    box-shadow: 0 2px 6px rgba(79, 70, 229, 0.22);
  }
  .sub-tabs button#subTabTab.active {
    background: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
    color: var(--surface);
    box-shadow: 0 2px 6px rgba(194, 65, 12, 0.28);
  }

  /* 3단 패널 */
  .panels {
    display: grid !important;
    grid-template-columns: 1fr 1fr 1fr !important;
    gap: 16px !important;
    align-items: start;
    width: 100% !important;
  }
  .panel {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    box-sizing: border-box !important;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-xs);
  }
  .panel:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-sm);
  }

  .panel-body {
    width: 100% !important;
    max-width: 100% !important;
    overflow: hidden !important;
    padding: 0;
  }

  /* 패널 헤더 - 모던 그라데이션 + 좌측 액센트 바 + 패턴 */
  .panel-head {
    padding: 16px 20px 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
    font-size: 17px;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
    gap: 8px;
    color: var(--surface);
    letter-spacing: -0.015em;
    position: relative;
    min-height: 60px;
    box-sizing: border-box;
  }
  .panel-head::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: rgba(255, 255, 255, 0.35);
  }
  .panel-head::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 100% 50%, rgba(255,255,255,0.12) 0%, transparent 50%),
      radial-gradient(circle at 0% 100%, rgba(0,0,0,0.10) 0%, transparent 40%);
    pointer-events: none;
  }
  .panel-head > span:first-child {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
    padding-left: 4px;
  }
  .panel-head.info {
    background: linear-gradient(120deg, #18181b 0%, #27272a 50%, #3f3f46 100%);
  }
  .panel-head.ext {
    background: linear-gradient(120deg, #3730a3 0%, #4f46e5 50%, #6366f1 100%);
  }
  .panel-head.tab {
    background: linear-gradient(120deg, #9a3412 0%, #c2410c 50%, #ea580c 100%);
  }

  .panel-head .count-badge {
    font-size: 17px;
    color: var(--text);
    font-weight: 800;
    background: #ffffff;
    padding: 5px 16px;
    border-radius: 14px;
    border: 0;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.20), inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    position: relative;
    z-index: 1;
    font-family: var(--font-mono);
    letter-spacing: -0.02em;
    min-width: 36px;
    text-align: center;
    line-height: 1.2;
  }

  .panel-footer {
    padding: 12px 16px;
    background: var(--surface-muted);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* 버튼 시스템 */
  button {
    font-family: inherit;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    padding: 8px 16px;
    background: var(--text);
    color: var(--surface);
    border: 0;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-primary:hover { background: #27272a; }

  .btn-accent {
    padding: 8px 16px;
    background: var(--accent);
    color: var(--surface);
    border: 0;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-accent:hover { background: var(--accent-hover); }

  .btn-ghost {
    padding: 8px 16px;
    background: var(--surface);
    color: var(--text-secondary);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-ghost:hover {
    background: var(--surface-muted);
    color: var(--text);
  }

  /* 정보 테이블 */
  table.info-table {
    width: 100% !important;
    max-width: 100% !important;
    border-collapse: collapse;
    font-size: 15px;
    table-layout: fixed !important;
  }
  table.info-table tr {
    border-bottom: 1px solid var(--divider);
  }
  table.info-table tr:last-child { border-bottom: 0; }
  table.info-table th,
  table.info-table td {
    padding: 9px 18px;
    text-align: left;
    vertical-align: middle;
    border: 0;
  }
  table.info-table th {
    background: var(--surface-muted);
    color: var(--text);
    font-weight: 700;
    width: 42%;
    white-space: normal;
    word-break: keep-all;
    font-size: 14px;
    letter-spacing: -0.01em;
    border-right: 1px solid var(--border);
  }
  table.info-table td {
    background: var(--surface);
    word-break: break-all;
    color: var(--text);
    font-weight: 600;
    font-size: 15px;
  }
  table.info-table td input,
  table.info-table td textarea {
    width: 100%;
    padding: 7px 11px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    transition: all 0.15s ease;
    font-weight: 500;
  }
  table.info-table td input:focus,
  table.info-table td textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  table.info-table td textarea {
    resize: vertical;
    min-height: 56px;
    line-height: 1.5;
  }
  .empty-val { color: var(--text-disabled); }

  /* 디바이스 테이블 */
  table.device-table {
    width: 100% !important;
    max-width: 100% !important;
    border-collapse: collapse;
    font-size: 15px;
    table-layout: fixed !important;
  }
  table.device-table thead th {
    background: var(--surface-muted);
    padding: 9px 6px;
    text-align: center;
    border: 0;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  table.device-table tbody tr {
    border-bottom: 1px solid var(--divider);
    transition: background 0.1s ease;
  }
  table.device-table tbody tr:hover {
    background: var(--surface-muted);
  }
  table.device-table tbody tr:hover td.num {
    background: #ececef;
  }
  table.device-table tbody tr:last-child {
    border-bottom: 1px solid var(--border);
  }
  table.device-table td {
    padding: 6px 6px;
    text-align: center;
    border: 0;
    word-break: break-all;
    overflow: hidden;
    vertical-align: middle;
    font-weight: 700;
    font-size: 15px;
  }
  table.device-table td.num {
    font-weight: 700;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    letter-spacing: -0.01em;
    background: var(--surface-muted);
    border-right: 1px solid var(--border);
    padding: 9px 6px;
  }
  table.device-table td.date-cell { padding: 4px 5px; }
  table.device-table .date-wrap {
    position: relative;
    display: block;
    width: 100%;
    cursor: pointer;
  }
  table.device-table .date-short {
    display: none;
  }
  table.device-table .cell-date {
    width: 100%;
    padding: 5px 4px;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 15px;
    font-family: var(--font-mono);
    background: transparent;
    text-align: center;
    box-sizing: border-box;
    color: var(--text);
    transition: all 0.15s ease;
    font-weight: 700;
  }
  /* 빈 날짜 값일 때 placeholder 텍스트 숨김 */
  table.device-table .cell-date:not(:focus):invalid,
  table.device-table .cell-date[value=""] {
    color: transparent;
  }
  table.device-table .cell-date:focus { color: var(--text); }
  /* 빈 input[type=date]의 placeholder 숨기기 (webkit) */
  table.device-table .cell-date::-webkit-datetime-edit-text,
  table.device-table .cell-date::-webkit-datetime-edit-month-field,
  table.device-table .cell-date::-webkit-datetime-edit-day-field,
  table.device-table .cell-date::-webkit-datetime-edit-year-field {
    color: var(--text);
    font-weight: 700;
  }
  table.device-table .cell-date.is-empty::-webkit-datetime-edit {
    color: transparent;
  }
  table.device-table .cell-date.is-empty::-webkit-datetime-edit-text,
  table.device-table .cell-date.is-empty::-webkit-datetime-edit-month-field,
  table.device-table .cell-date.is-empty::-webkit-datetime-edit-day-field,
  table.device-table .cell-date.is-empty::-webkit-datetime-edit-year-field {
    color: transparent;
  }
  table.device-table .cell-date.is-empty:focus::-webkit-datetime-edit,
  table.device-table .cell-date.is-empty:focus::-webkit-datetime-edit-text,
  table.device-table .cell-date.is-empty:focus::-webkit-datetime-edit-month-field,
  table.device-table .cell-date.is-empty:focus::-webkit-datetime-edit-day-field,
  table.device-table .cell-date.is-empty:focus::-webkit-datetime-edit-year-field {
    color: var(--text);
  }
  table.device-table .cell-date:hover {
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
  }
  table.device-table .cell-date:focus {
    outline: none;
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
    color: var(--text);
  }
  table.device-table .btn-x {
    padding: 6px 14px;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  table.device-table .btn-x:hover {
    background: var(--danger);
    color: var(--surface);
    border-color: var(--danger);
  }
  .empty-row td {
    padding: 36px 14px;
    color: var(--text-muted);
    text-align: center;
    font-size: 14.5px;
  }

  table.device-table tfoot td {
    background: var(--surface-muted);
    padding: 8px 6px;
    border: 0;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  table.device-table .btn-add {
    padding: 7px 16px;
    background: var(--accent);
    color: var(--surface);
    border: 0;
    border-radius: 4px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  table.device-table .btn-add:hover { background: var(--accent-hover); }

  /* 번호 선택 드롭다운 */
  .num-select {
    position: relative;
    width: 100%;
  }
  .num-select-btn {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--surface);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    box-sizing: border-box;
    transition: all 0.15s ease;
    font-weight: 600;
  }
  .num-select-btn:hover { border-color: var(--text-muted); }
  .num-select-btn .arrow { color: var(--text-muted); font-size: 9px; }
  .num-select-list {
    display: none;
    position: fixed;
    min-width: 140px;
    max-width: 90vw;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
    z-index: 99999;
    padding: 4px;
  }
  .num-select.open .num-select-list { display: block !important; }
  .num-select-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14.5px;
    color: var(--text);
    white-space: nowrap;
    border-radius: 5px;
    transition: background 0.1s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .num-select-item:hover:not(.disabled) { background: var(--surface-muted); }
  .num-select-item.disabled {
    color: var(--text-disabled);
    cursor: not-allowed;
  }
  .num-select-item .muted {
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 400;
  }
  .num-select-item .ok {
    color: var(--success);
    font-size: 12.5px;
    font-weight: 600;
  }
  .num-select-item .num-text {
    font-family: var(--font-mono);

  /* 단말 현황 (마스터) 카드 */
  .card {
    background: var(--surface);

    border: 1px solid var(--border);

  }
  .card-body { padding: 20px; }

  .master-tabs {
    display: inline-flex;

    border-radius: var(--radius-lg);

  }
  .master-tabs button {
    padding: 12px 26px;
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-weight: 700;
    border-radius: var(--radius-sm);
    font-size: 16px;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: -0.01em;
  }
  .master-tabs button:hover { color: var(--text); }
  .master-tabs button#mTabExt.active {
    background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    color: var(--surface);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.28);
  }
  .master-tabs button#mTabTab.active {
    background: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
    color: var(--surface);
    box-shadow: 0 2px 8px rgba(194, 65, 12, 0.30);
  }

  .summary {
    display: flex;
    gap: 24px;
    font-size: 14px;
    color: var(--text-secondary);
    padding: 12px 0 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 20px;
  }
  .summary > span {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .summary strong {
    color: var(--text);
    font-weight: 700;
    font-size: 17px;
    font-family: var(--font-mono);
  }
  .summary .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .summary .dot.total { background: var(--text); }
  .summary .dot.used { background: var(--success); }
  .summary .dot.unused { background: var(--text-disabled); }

  .master-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* 브랜드 그룹 카드 */
  .brand-group {
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    overflow: hidden;
    transition: all 0.15s ease;
    box-shadow: var(--shadow-xs);
  }
  .brand-group:hover {
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }
  .brand-group-head {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  .brand-group.used .brand-group-head {
    background: linear-gradient(135deg, #15803d 0%, #16a34a 100%);
    color: #ffffff;
    border-bottom-color: #15803d;
    box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
  }
  .brand-group.unused .brand-group-head {
    background: var(--surface-muted);
    color: var(--text);
    border-bottom-color: var(--border-strong);
  }
  .brand-group .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .brand-group .brand-count {
    font-size: 14px;
    font-weight: 800;
    font-family: var(--font-mono);
    padding: 2px 10px;
    border-radius: 10px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .brand-group.used .brand-count {
    background: rgba(255, 255, 255, 0.95);
    color: #15803d;
  }
  .brand-group.unused .brand-count {
    background: var(--text);
    color: var(--surface);
  }
  .brand-group-body {
    padding: 12px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: var(--surface);
  }
  .num-chip {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.02em;
    border: 1.5px solid var(--border);
    background: var(--surface-muted);
    color: var(--text);
    line-height: 1.1;
  }
  .brand-group.used .num-chip {
    background: #f0fdf4;
    border-color: #86efac;
    color: #14532d;
  }
  .brand-group.unused .num-chip {
    background: var(--surface);
    border-color: var(--border-strong);
    color: var(--text);
  }

  .legend {
    margin-top: 18px;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .legend > span {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .legend .swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .legend .swatch.used {
    background: linear-gradient(135deg, #15803d 0%, #16a34a 100%);
    border-color: #15803d;
  }
  .legend .swatch.unused { background: var(--surface); }

  /* 빈 상태 */
  .empty-state {
    padding: 48px 20px;
    color: var(--text-muted);
    text-align: center;
    font-size: 14px;
  }
  .empty-state-icon {
    font-size: 32px;
    opacity: 0.5;
    margin-bottom: 10px;
    display: block;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: var(--surface);
    padding: 12px 22px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 200;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 모바일 */
  @media (max-width: 900px) {
    .panels {
      display: block !important;
      grid-template-columns: none !important;
    }
    .sub-tabs { display: flex; }
    .panel {
      display: none;
      margin-bottom: 0;
      width: 100% !important;
    }
    .panel.active { display: block; }
  }
  @media (max-width: 600px) {
    body { padding: 14px; font-size: 14.5px; }
    .page-header { margin-bottom: 18px; gap: 10px; padding-bottom: 14px; }
    .page-header::after { height: 2.5px; }
    .header-badge { width: 36px; height: 36px; border-radius: 9px; }
    .header-badge svg { width: 20px; height: 20px; }
    .page-header h1 { font-size: 21px; }
    .main-tabs { margin-bottom: 16px; }
    .main-tabs button { font-size: 14.5px; padding: 10px 18px; }
    .master-tabs { margin-bottom: 16px; }
    .master-tabs button { font-size: 14.5px; padding: 10px 18px; }
    .top-bar { margin-bottom: 14px; gap: 8px; }
    .top-bar .label { font-size: 14px; }
    .custom-select { min-width: 100%; }
    .custom-select-btn { font-size: 14px; padding: 10px 14px; }
    .sub-tabs { margin-bottom: 12px; }
    .sub-tabs button { font-size: 13px; padding: 10px 6px; }
    .panel-head { padding: 14px 16px 14px 20px; font-size: 15.5px; min-height: 54px; }
    .panel-head .count-badge { font-size: 15px; padding: 4px 13px; min-width: 32px; }
    .panel-footer { padding: 10px 12px; }
    table.info-table th { width: 40%; padding: 8px 13px; font-size: 13px; }
    table.info-table td { padding: 8px 13px; font-size: 14px; }
    table.info-table td input,
    table.info-table td textarea { font-size: 14px; padding: 7px 11px; }
    table.device-table { font-size: 14px; }
    /* 모바일: 컬럼 폭 재배분 - 날짜 공간 확보 */
    table.device-table colgroup col,
    table.device-table thead th:nth-child(1) { width: 16% !important; }
    table.device-table thead th:nth-child(2),
    table.device-table thead th:nth-child(3) { width: 28% !important; }
    table.device-table thead th:nth-child(4) { width: 28% !important; }
    table.device-table thead th { font-size: 14px; padding: 8px 4px; }
    table.device-table td { font-size: 14px; padding: 6px 4px; }
    table.device-table td.num { font-size: 14px; padding: 8px 4px; }
    table.device-table td.date-cell { padding: 3px 2px; }
    /* 모바일: input은 클릭 영역으로만 사용하고 시각적으로는 짧은 텍스트 표시 */
    table.device-table .date-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 4px 2px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all 0.15s ease;
    }
    table.device-table .date-wrap:hover {
      background: var(--surface);
      border-color: var(--border-strong);
    }
    table.device-table .date-wrap:active,
    table.device-table .date-wrap:focus-within {
      background: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    table.device-table .date-short {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 13.5px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
      white-space: nowrap;
    }
    /* input은 보이지 않게 하되 클릭은 가능 */
    table.device-table .cell-date {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      padding: 0;
      border: 0;
      cursor: pointer;
      pointer-events: auto;
    }
    table.device-table .btn-x { font-size: 12.5px; padding: 5px 11px; }
    table.device-table .btn-add { font-size: 12.5px; padding: 6px 13px; }
    .num-select-btn { font-size: 13px; padding: 7px 10px; }
    .card-body { padding: 16px; }
    .master-grid { grid-template-columns: 1fr; gap: 10px; }
    .brand-group-head { padding: 9px 12px; }
    .brand-group .brand-name { font-size: 14px; }
    .brand-group .brand-count { font-size: 13px; padding: 2px 9px; }
    .brand-group-body { padding: 11px 12px; gap: 7px; }
    .num-chip { font-size: 16px; padding: 7px 12px; }
    .summary { gap: 16px; font-size: 13px; padding: 8px 0 16px; margin-bottom: 16px; }
    .summary strong { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-badge">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <h1>주택전시관 현황 관리</h1>
</div>

<div class="main-tabs">
  <button id="mainTabInfo" class="active" onclick="switchMainTab('info')">현장 정보</button>
  <button id="mainTabDevice" onclick="switchMainTab('device')">단말 현황</button>
</div>

<!-- 탭 1: 주택전시관 정보 현황 -->
<div id="tabContentInfo" class="tab-content active">
  <div class="top-bar">
    <span class="label">주택전시관</span>
    <div class="custom-select" id="customSelect">
      <button class="custom-select-btn" id="siteSelectBtn" onclick="toggleSiteDropdown()" type="button">
        <span id="siteSelectLabel">주택전시관을 선택하세요</span>
        <span class="arrow">▾</span>
      </button>
      <div class="custom-select-list" id="siteSelectList"></div>
    </div>
  </div>

  <div class="sub-tabs">
    <button id="subTabInfo" class="active" onclick="switchSubTab('info')">현황</button>
    <button id="subTabExt" onclick="switchSubTab('ext')">내선전화</button>
    <button id="subTabTab" onclick="switchSubTab('tab')">테블릿</button>
  </div>

  <div class="panels">
    <div class="panel active" data-key="info">
      <div class="panel-head info">
        <span>현황</span>
      </div>
      <div class="panel-body" id="infoBody"></div>
    </div>
    <div class="panel" data-key="ext">
      <div class="panel-head ext">
        <span>내선전화</span>
        <span id="extCount" class="count-badge"></span>
      </div>
      <div class="panel-body" id="extBody"></div>
    </div>
    <div class="panel" data-key="tab">
      <div class="panel-head tab">
        <span>테블릿</span>
        <span id="tabCount" class="count-badge"></span>
      </div>
      <div class="panel-body" id="tabBody"></div>
    </div>
  </div>
</div>

<!-- 탭 2: 단말 현황 -->
<div id="tabContentDevice" class="tab-content">
  <div class="card">
    <div class="card-body">
      <div class="master-tabs">
        <button id="mTabExt" class="active" onclick="switchMasterTab('ext')">내선전화</button>
        <button id="mTabTab" onclick="switchMasterTab('tab')">테블릿</button>
      </div>
      <div class="summary" id="masterSummary"></div>
      <div class="master-grid" id="masterGrid"></div>
      <div class="legend">
        <span><span class="swatch used"></span>사용중</span>
        <span><span class="swatch unused"></span>미사용</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pptrrnupppqcjnjxqafd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_McD4q2AbK1Rbq3Rmt2DbOA_JMBs7bnZ';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sites = [], extensions = [], tablets = [], masterExt = [], masterTab = [];
let currentSiteId = null;
let editing = false;
let masterActive = 'ext';

const INFO_FIELDS = [
  ['brand',       '브랜드명',                       false],
  ['did',         'DID',                            false],
  ['ext_group',   '내선그룹',                       false],
  ['dnis',        'DNIS',                           false],
  ['ip',          'IP',                             false],
  ['rep_phone',   '주택전시관 대표번호',            false],
  ['dcrm_name',   'DCRM 담당자',                    false],
  ['dcrm_mobile', 'DCRM 담당자 HP',                 false],
  ['tax_name',    '계산서 담당자',                  false],
  ['tax_mobile',  '계산서 담당자 HP',               false],
  ['tax_email',   '계산서 담당자 메일',             false],
  ['hongbo_addr', '홍보관 주소',                    true],
  ['jeonsi_addr', '전시관 주소',                    true],
];

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg) {
  const t = $('toast'); t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadAll() {
  try {
    const [s, e, t, mE, mT] = await Promise.all([
      supa.from('juteak_sites').select('*').order('site_no'),
      supa.from('juteak_extensions').select('*').order('num'),
      supa.from('juteak_tablets').select('*').order('num'),
      supa.from('juteak_master_ext').select('*').order('num'),
      supa.from('juteak_master_tab').select('*').order('num'),
    ]);
    if (s.error) throw s.error;
    if (e.error) throw e.error;
    if (t.error) throw t.error;
    if (mE.error) throw mE.error;
    if (mT.error) throw mT.error;
    sites = s.data; extensions = e.data; tablets = t.data;
    masterExt = mE.data; masterTab = mT.data;
  } catch (err) {
    console.error(err);
    toast('데이터 로드 실패: ' + (err.message || err));
  }
}

function renderSiteSelect() {
  const list = $('siteSelectList');
  list.innerHTML = '';
  for (const s of sites) {
    const brand = s.brand || s.house_name || '';
    const label = `${s.group_name || ('현장 ' + s.site_no)} — ${brand}`;
    const item = document.createElement('div');
    item.className = 'custom-select-item';
    item.textContent = label;
    item.dataset.id = s.id;
    if (s.id == currentSiteId) item.classList.add('selected');
    item.onclick = () => selectSite(s.id, label);
    list.appendChild(item);
  }
  if (currentSiteId) {
    const cur = sites.find(s => s.id == currentSiteId);
    if (cur) {
      const brand = cur.brand || cur.house_name || '';
      $('siteSelectLabel').textContent = `${cur.group_name} — ${brand}`;
    }
  } else {
    $('siteSelectLabel').textContent = '주택전시관을 선택하세요';
  }
}

function toggleSiteDropdown() {
  $('customSelect').classList.toggle('open');
}

function selectSite(id, label) {
  currentSiteId = id;
  editing = false;
  $('siteSelectLabel').textContent = label;
  $('customSelect').classList.remove('open');
  document.querySelectorAll('.custom-select-item').forEach(it => {
    it.classList.toggle('selected', it.dataset.id == id);
  });
  renderAll();
}

function closeAllNumDropdowns() {
  document.querySelectorAll('.num-select').forEach(el => {
    el.classList.remove('open');
    const list = el.querySelector('.num-select-list');
    if (list) {
      list.style.display = '';
      list.style.top = '';
      list.style.left = '';
      list.style.maxHeight = '';
    }
  });
}

let _suppressOutsideClick = false;

function handleOutsideClick(e) {
  if (_suppressOutsideClick) return;
  if (e.target.closest('.num-select')) return;
  if (e.target.closest('.num-select-list')) return;
  const cs = document.getElementById('customSelect');
  if (cs && !cs.contains(e.target)) cs.classList.remove('open');
  closeAllNumDropdowns();
}
document.addEventListener('click', handleOutsideClick);

function getSite(id) { return sites.find(s => s.id == id); }

function renderAll() {
  renderInfo();
  renderDevice('ext');
  renderDevice('tab');
  enforcePanelWidth();
}

function enforcePanelWidth() {
  if (window.innerWidth <= 900) return;
  const apply = () => {
    const panels = document.querySelectorAll('.panels .panel');
    if (panels.length < 3) return;
    const container = document.querySelector('.panels');
    if (!container) return;
    const cw = container.getBoundingClientRect().width;
    const gap = 16;
    const w = (cw - gap * 2) / 3;
    panels.forEach(p => {
      p.style.width = w + 'px';
      p.style.maxWidth = w + 'px';
      p.style.minWidth = w + 'px';
      p.style.boxSizing = 'border-box';
    });
  };
  apply();
  requestAnimationFrame(apply);
  setTimeout(apply, 100);
}

window.addEventListener('resize', () => {
  if (window.innerWidth > 900) {
    document.querySelectorAll('.panels .panel').forEach(p => {
      p.style.width = '';
      p.style.maxWidth = '';
      p.style.minWidth = '';
    });
    enforcePanelWidth();
  } else {
    document.querySelectorAll('.panels .panel').forEach(p => {
      p.style.width = '';
      p.style.maxWidth = '';
      p.style.minWidth = '';
    });
  }
});

function renderInfo() {
  const body = $('infoBody');
  if (!currentSiteId) {
    body.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">○</span>
        주택전시관을 선택하세요
      </div>`;
    return;
  }
  const s = getSite(currentSiteId);
  if (!s) return;

  if (editing) {
    body.innerHTML = `
      <table class="info-table">
        ${INFO_FIELDS.map(([k, l, multi]) => `
          <tr>
            <th>${escapeHtml(l)}</th>
            <td>${multi
              ? `<textarea data-f="${k}">${escapeHtml(s[k] || '')}</textarea>`
              : `<input data-f="${k}" value="${escapeHtml(s[k] || '')}">`
            }</td>
          </tr>
        `).join('')}
      </table>
      <div class="panel-footer">
        <button class="btn-ghost" onclick="cancelEdit()">취소</button>
        <button class="btn-primary" onclick="saveSite()">저장</button>
      </div>
    `;
  } else {
    body.innerHTML = `
      <table class="info-table">
        ${INFO_FIELDS.map(([k, l]) => `
          <tr>
            <th>${escapeHtml(l)}</th>
            <td>${s[k] ? escapeHtml(s[k]) : '<span class="empty-val">—</span>'}</td>
          </tr>
        `).join('')}
      </table>
      <div class="panel-footer">
        <button class="btn-accent" onclick="startEdit()">수정</button>
      </div>
    `;
  }
}

function renderDevice(kind) {
  const isExt = kind === 'ext';
  const items = isExt ? extensions : tablets;
  const master = isExt ? masterExt : masterTab;
  const body = $(isExt ? 'extBody' : 'tabBody');
  const count = $(isExt ? 'extCount' : 'tabCount');

  if (!currentSiteId) {
    body.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">○</span>
        주택전시관을 선택하세요
      </div>`;
    count.textContent = '';
    return;
  }
  const s = getSite(currentSiteId);
  if (!s) return;
  const list = items.filter(x => x.site_no === s.site_no);
  count.textContent = `${list.length}`;

  const usedMap = {};
  for (const it of items) usedMap[it.num] = it.site_no;

  const fmtShort = (d) => {
    if (!d) return '';
    // YYYY-MM-DD → YY-MM-DD
    const m = String(d).match(/^(\d{2})(\d{2})-(\d{2})-(\d{2})$/);
    if (m) return `${m[2]}-${m[3]}-${m[4]}`;
    return d;
  };
  window.fmtShortDate = fmtShort;

  const rows = list.length
    ? list.map(it => `
      <tr>
        <td class="num">${escapeHtml(it.num)}</td>
        <td class="date-cell">
          <label class="date-wrap">
            <input type="date" class="cell-date${it.issued_date ? '' : ' is-empty'}" value="${escapeHtml(it.issued_date || '')}"
              onchange="updateDeviceDate('${kind}', ${it.id}, 'issued_date', this.value); this.classList.toggle('is-empty', !this.value); const s=this.parentNode.querySelector('.date-short'); if(s) s.textContent = (window.fmtShortDate||(v=>v))(this.value);">
            <span class="date-short">${escapeHtml(fmtShort(it.issued_date))}</span>
          </label>
        </td>
        <td class="date-cell">
          <label class="date-wrap">
            <input type="date" class="cell-date${it.returned_date ? '' : ' is-empty'}" value="${escapeHtml(it.returned_date || '')}"
              onchange="updateDeviceDate('${kind}', ${it.id}, 'returned_date', this.value); this.classList.toggle('is-empty', !this.value); const s=this.parentNode.querySelector('.date-short'); if(s) s.textContent = (window.fmtShortDate||(v=>v))(this.value);">
            <span class="date-short">${escapeHtml(fmtShort(it.returned_date))}</span>
          </label>
        </td>
        <td><button class="btn-x" onclick="removeDevice('${kind}', ${it.id})">삭제</button></td>
      </tr>`).join('')
    : `<tr class="empty-row"><td colspan="4">등록된 항목이 없습니다</td></tr>`;

  const optItems = master.map(m => {
    const usedAtSiteNo = usedMap[m.num];
    if (usedAtSiteNo) {
      const usedAt = sites.find(x => x.site_no === usedAtSiteNo);
      const usedLabel = usedAt ? (usedAt.group_name || ('현장'+usedAtSiteNo)) : ('현장'+usedAtSiteNo);
      const isMine = usedAtSiteNo === s.site_no;
      return `<div class="num-select-item disabled" data-num=""><span class="num-text">${escapeHtml(m.num)}</span><span class="muted">사용중 · ${escapeHtml(usedLabel)}${isMine ? ' (현재)' : ''}</span></div>`;
    }
    return `<div class="num-select-item" data-num="${escapeHtml(m.num)}" onclick="selectDeviceNum('${kind}', this, event)"><span class="num-text">${escapeHtml(m.num)}</span><span class="ok">미사용</span></div>`;
  }).join('');

  body.innerHTML = `
    <table class="device-table">
      <thead>
        <tr>
          <th style="width:20%;">번호</th>
          <th style="width:30%;">발급일</th>
          <th style="width:30%;">회수일</th>
          <th style="width:20%;">관리</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr class="add-tr">
          <td>
            <div class="num-select" id="${kind}_numSelect">
              <button type="button" class="num-select-btn" onclick="toggleNumDropdown('${kind}', event)">
                <span id="${kind}_numLabel">번호</span>
                <span class="arrow">▾</span>
              </button>
              <div class="num-select-list" id="${kind}_numList">${optItems}</div>
            </div>
            <input type="hidden" id="${kind}_num" value="">
          </td>
          <td></td>
          <td></td>
          <td>
            <button class="btn-add" onclick="addDevice('${kind}', ${s.site_no})">등록</button>
          </td>
        </tr>
      </tfoot>
    </table>
  `;
}

function toggleNumDropdown(kind, ev) {
  if (ev) {
    ev.stopPropagation();
    ev.preventDefault();
  }
  const target = document.getElementById(`${kind}_numSelect`);
  if (!target) return;
  const isOpen = target.classList.contains('open');
  closeAllNumDropdowns();
  if (isOpen) return;

  _suppressOutsideClick = true;
  setTimeout(() => { _suppressOutsideClick = false; }, 200);

  target.classList.add('open');

  requestAnimationFrame(() => {
    const btn = target.querySelector('.num-select-btn');
    const list = target.querySelector('.num-select-list');
    if (!btn || !list) return;

    const rect = btn.getBoundingClientRect();
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    list.style.position = 'fixed';
    list.style.top = '0px';
    list.style.left = '0px';
    list.style.display = 'block';
    list.style.visibility = 'hidden';
    const lh = list.getBoundingClientRect().height;
    const lw = list.getBoundingClientRect().width;
    list.style.visibility = '';

    const spaceBelow = vh - rect.bottom - 8;
    const spaceAbove = rect.top - 8;
    let top;
    if (lh <= spaceBelow) {
      top = rect.bottom + 4;
    } else if (lh <= spaceAbove) {
      top = rect.top - lh - 4;
    } else {
      if (spaceBelow >= spaceAbove) {
        top = rect.bottom + 4;
        list.style.maxHeight = (spaceBelow - 4) + 'px';
      } else {
        top = 4;
        list.style.maxHeight = (rect.top - 8) + 'px';
      }
    }

    let left = rect.left;
    const maxLeft = vw - Math.min(lw, 280) - 8;
    if (left > maxLeft) left = Math.max(8, maxLeft);

    list.style.top = top + 'px';
    list.style.left = left + 'px';
    list.style.minWidth = Math.max(rect.width, 200) + 'px';
  });
}

function selectDeviceNum(kind, el, ev) {
  if (ev) {
    ev.stopPropagation();
    ev.preventDefault();
  }
  const num = el.dataset.num;
  if (!num) return;
  _suppressOutsideClick = true;
  setTimeout(() => { _suppressOutsideClick = false; }, 300);

  const numInput = document.getElementById(`${kind}_num`);
  const numLabel = document.getElementById(`${kind}_numLabel`);
  if (numInput) numInput.value = num;
  if (numLabel) numLabel.textContent = num;
  closeAllNumDropdowns();
  toast(num + ' 선택됨');
}

function startEdit() { editing = true; renderInfo(); enforcePanelWidth(); }
function cancelEdit() { editing = false; renderInfo(); enforcePanelWidth(); }

async function saveSite() {
  const updates = {};
  document.querySelectorAll('#infoBody [data-f]').forEach(el => {
    updates[el.dataset.f] = el.value.trim();
  });
  updates.updated_at = new Date().toISOString();
  try {
    const { error } = await supa.from('juteak_sites').update(updates).eq('id', currentSiteId);
    if (error) throw error;
    const idx = sites.findIndex(s => s.id == currentSiteId);
    if (idx >= 0) sites[idx] = { ...sites[idx], ...updates };
    editing = false;
    renderSiteSelect();
    renderInfo();
    toast('저장되었습니다');
  } catch (e) {
    toast('저장 실패: ' + (e.message || e));
  }
}

async function addDevice(kind, siteNo) {
  const num = $(`${kind}_num`).value.trim();
  if (!num) { alert('번호를 선택하세요.'); return; }
  const table = kind === 'ext' ? 'juteak_extensions' : 'juteak_tablets';
  try {
    const { data: inserted, error } = await supa
      .from(table).insert({ site_no: siteNo, num })
      .select().single();
    if (error) throw error;
    if (kind === 'ext') extensions.push(inserted);
    else tablets.push(inserted);
    renderDevice('ext'); renderDevice('tab'); renderMaster();
    toast('등록되었습니다');
  } catch (e) {
    toast('등록 실패: ' + (e.message || e));
  }
}

async function removeDevice(kind, id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  const table = kind === 'ext' ? 'juteak_extensions' : 'juteak_tablets';
  try {
    const { error } = await supa.from(table).delete().eq('id', id);
    if (error) throw error;
    if (kind === 'ext') extensions = extensions.filter(x => x.id !== id);
    else tablets = tablets.filter(x => x.id !== id);
    renderDevice('ext'); renderDevice('tab'); renderMaster();
    toast('삭제되었습니다');
  } catch (e) {
    toast('삭제 실패: ' + (e.message || e));
  }
}

async function updateDeviceDate(kind, id, field, value) {
  const table = kind === 'ext' ? 'juteak_extensions' : 'juteak_tablets';
  const newVal = value || null;
  try {
    const { error } = await supa.from(table).update({ [field]: newVal }).eq('id', id);
    if (error) throw error;
    const list = kind === 'ext' ? extensions : tablets;
    const item = list.find(x => x.id === id);
    if (item) item[field] = newVal;
    toast('날짜가 저장되었습니다');
  } catch (e) {
    toast('저장 실패: ' + (e.message || e));
  }
}

function switchMainTab(t) {
  const isInfo = t === 'info';
  $('mainTabInfo').classList.toggle('active', isInfo);
  $('mainTabDevice').classList.toggle('active', !isInfo);
  $('tabContentInfo').classList.toggle('active', isInfo);
  $('tabContentDevice').classList.toggle('active', !isInfo);
}

function switchSubTab(key) {
  $('subTabInfo').classList.toggle('active', key === 'info');
  $('subTabExt').classList.toggle('active', key === 'ext');
  $('subTabTab').classList.toggle('active', key === 'tab');
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.dataset.key === key);
  });
}

function switchMasterTab(t) {
  masterActive = t;
  $('mTabExt').classList.toggle('active', t === 'ext');
  $('mTabTab').classList.toggle('active', t === 'tab');
  renderMaster();
}

function renderMaster() {
  const grid = $('masterGrid');
  const summary = $('masterSummary');
  const isExt = masterActive === 'ext';
  const master = isExt ? masterExt : masterTab;
  const usage = isExt ? extensions : tablets;
  const usageMap = {};
  for (const u of usage) (usageMap[u.num] = usageMap[u.num] || []).push(u.site_no);
  const usedCount = master.filter(m => usageMap[m.num]).length;
  summary.innerHTML = `
    <span><span class="dot total"></span>전체 <strong>${master.length}</strong></span>
    <span><span class="dot used"></span>사용중 <strong>${usedCount}</strong></span>
    <span><span class="dot unused"></span>미사용 <strong>${master.length - usedCount}</strong></span>
  `;

  // 브랜드별로 번호 그룹핑
  const brandGroups = {}; // { brandName: [{num, siteNo}, ...] }
  const unusedNums = [];

  for (const m of master) {
    const list = usageMap[m.num];
    if (list && list.length > 0) {
      for (const siteNo of list) {
        const s = sites.find(x => x.site_no === siteNo);
        const brand = s ? (s.brand || s.house_name || s.group_name || ('현장'+siteNo)) : ('현장'+siteNo);
        if (!brandGroups[brand]) brandGroups[brand] = [];
        brandGroups[brand].push({ num: m.num, siteNo });
      }
    } else {
      unusedNums.push(m.num);
    }
  }

  // 브랜드 정렬 (가나다순)
  const brandNames = Object.keys(brandGroups).sort((a, b) => a.localeCompare(b, 'ko'));

  let html = '';

  // 사용중 - 브랜드별 그룹 카드
  for (const brand of brandNames) {
    const nums = brandGroups[brand].sort((a, b) => a.num.localeCompare(b.num));
    html += `
      <div class="brand-group used">
        <div class="brand-group-head">
          <span class="brand-name">${escapeHtml(brand)}</span>
          <span class="brand-count">${nums.length}</span>
        </div>
        <div class="brand-group-body">
          ${nums.map(n => `<span class="num-chip">${escapeHtml(n.num)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  // 미사용 - 하나의 그룹으로 묶기
  if (unusedNums.length > 0) {
    html += `
      <div class="brand-group unused">
        <div class="brand-group-head">
          <span class="brand-name">미사용</span>
          <span class="brand-count">${unusedNums.length}</span>
        </div>
        <div class="brand-group-body">
          ${unusedNums.map(num => `<span class="num-chip">${escapeHtml(num)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  grid.innerHTML = html;
}

(async () => {
  toast('데이터를 불러오는 중...');
  await loadAll();
  renderSiteSelect();
  renderAll();
  renderMaster();
  enforcePanelWidth();
  setTimeout(enforcePanelWidth, 300);
  setTimeout(enforcePanelWidth, 800);
  toast(`${sites.length}개 현장 로드 완료`);

  const refresh = async () => {
    if (editing) return;
    await loadAll();
    renderSiteSelect();
    renderAll();
    renderMaster();
  };
  supa.channel('juteak_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'juteak_sites' }, refresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'juteak_extensions' }, refresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'juteak_tablets' }, refresh)
    .subscribe();
})();
</script>
</body>
</html>
